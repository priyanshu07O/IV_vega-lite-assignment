<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vega-Lite Assignment 3 - A+ Interactive Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 25px; background-color: #f0f2f5; }
    h2 { color: #2d3748; text-align: center; margin-bottom: 20px; }
    #vis { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: max-content; margin: 0 auto; }
  </style>
</head>
<body>
  <h2>Multi-Dimensional Sales Dashboard</h2>
  <div id="vis"></div>

  <script>
    const spec = {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
      "data": {
        "url": "HW_III.csv",
        "format": {"type": "csv", "parse": {"OrderDate": "date:'%m/%d/%Y'"}}
      },
      "transform": [
        {"calculate": "toNumber(replace(datum.Total, ',', ''))", "as": "TotalNum"},
        {"calculate": "toNumber(datum.Units)", "as": "UnitsNum"},
        {"calculate": "toNumber(datum['Unit Cost'])", "as": "UnitCostNum"}
      ],
      "vconcat": [
        {
          "hconcat": [
            {
              "title": "1. Rep Contribution (Click to Highlight)",
              "width": 200, "height": 200,
              "mark": {"type": "arc", "innerRadius": 60, "stroke": "#fff"},
              "params": [{"name": "repSelect", "select": {"type": "point", "fields": ["Rep"]}}],
              "transform": [{"filter": {"param": "brush"}}], 
              "encoding": {
                "theta": {"field": "TotalNum", "type": "quantitative", "aggregate": "sum"},
                "color": {"field": "Rep", "type": "nominal", "scale": {"scheme": "tableau10"}},
                "opacity": {"condition": {"param": "repSelect", "value": 1}, "value": 0.2},
                "tooltip": [{"field": "Rep"}, {"field": "TotalNum", "aggregate": "sum", "title": "Total ($)", "format": ",.2f"}]
              }
            },
            {
              "title": "2. Sales Volume Trend (Streamgraph)",
              "width": 450, "height": 200,
              "mark": {"type": "area", "interpolate": "monotone", "line": false},
              "transform": [{"filter": {"param": "brush"}}], 
              "encoding": {
                "x": {"timeUnit": "yearmonth", "field": "OrderDate", "axis": {"format": "%b %y", "grid": false}, "title": "Timeline"},
                "y": {"aggregate": "sum", "field": "TotalNum", "stack": "center", "axis": null},
                "color": {
                  "field": "Item", 
                  "type": "nominal", 
                  "scale": {
                    "domain": ["Binder", "Desk", "Pen", "Pen Set", "Pencil"],
                    "range": ["#FF595E", "#FFCA3A", "#8AC926", "#1982C4", "#6A4C93"]
                  }
                }, 
                "opacity": {"condition": {"param": "repSelect", "value": 0.9}, "value": 0.15},
                "tooltip": [{"field": "Item"}, {"timeUnit": "yearmonth", "field": "OrderDate", "title": "Month"}, {"field": "TotalNum", "aggregate": "sum", "format": "$.2f", "title": "Volume ($)"}]
              }
            }
          ]
        },
        {
          "title": "3. Trellis Units Distribution with Mean Overlays",
          "facet": {"field": "Item", "type": "nominal", "columns": 5},
          "spec": {
            "width": 110, "height": 80,
            "layer": [
              {
                "mark": {"type": "bar", "color": "#718096"},
                "encoding": {
                  "x": {"bin": {"maxbins": 10}, "field": "UnitsNum", "title": "Units"},
                  "y": {"aggregate": "count", "title": "Freq"},
                  "opacity": {"condition": {"param": "repSelect", "value": 1}, "value": 0.2},
                  "tooltip": [{"field": "UnitsNum", "bin": {"maxbins": 10}, "title": "Units Range"}, {"aggregate": "count", "title": "Frequency"}]
                }
              },
              {
                "mark": {"type": "rule", "color": "#e53e3e", "size": 3},
                "encoding": {
                  "x": {"aggregate": "mean", "field": "UnitsNum"},
                  "tooltip": [{"aggregate": "mean", "field": "UnitsNum", "title": "Average Units", "format": ".1f"}]
                }
              }
            ]
          }
        },
        {
          "hconcat": [
            {
              "title": "4. Region Performance (Stacked by Item)",
              "width": 300, "height": 200,
              "mark": {"type": "bar", "cornerRadiusTop": 3},
              "params": [{"name": "regClick", "select": {"type": "point", "fields": ["Region"]}}],
              "transform": [{"filter": {"param": "brush"}}], 
              "encoding": {
                "x": {"field": "Region", "type": "nominal", "axis": {"labelAngle": 0}},
                "y": {"aggregate": "sum", "field": "TotalNum", "title": "Total Revenue"},
                "color": {
                  "field": "Item", 
                  "type": "nominal", 
                  "scale": {
                    "domain": ["Binder", "Desk", "Pen", "Pen Set", "Pencil"],
                    "range": ["#FF595E", "#FFCA3A", "#8AC926", "#1982C4", "#6A4C93"]
                  }
                },
                "opacity": {"condition": {"param": "repSelect", "value": 1}, "value": 0.3},
                "tooltip": [{"field": "Region"}, {"field": "Item"}, {"aggregate": "sum", "field": "TotalNum", "title": "Revenue", "format": "$.2f"}]
              }
            },
            {
              "title": "5. Item Cost vs. Total (Drag to Brush)",
              "width": 350, "height": 200,
              "mark": {"type": "point", "filled": true, "size": 100, "stroke": "#333", "strokeWidth": 0.5},
              "params": [{"name": "brush", "select": "interval"}],
              "transform": [{"filter": {"param": "regClick"}}], 
              "encoding": {
                "x": {"field": "UnitCostNum", "type": "quantitative", "title": "Unit Cost ($)"},
                "y": {"field": "TotalNum", "type": "quantitative", "title": "Total ($)"},
                "color": {
                  "field": "Item", 
                  "type": "nominal", 
                  "scale": {
                    "domain": ["Binder", "Desk", "Pen", "Pen Set", "Pencil"],
                    "range": ["#FF595E", "#FFCA3A", "#8AC926", "#1982C4", "#6A4C93"]
                  }
                }, 
                "opacity": {
                  "condition": {"param": "brush", "empty": false, "value": 1},
                  "value": 0.15
                },
                "tooltip": [{"field": "Rep"}, {"field": "Item"}, {"field": "UnitCostNum", "title": "Unit Cost", "format": "$.2f"}, {"field": "TotalNum", "title": "Total", "format": "$.2f"}]
              }
            }
          ]
        }
      ],
      "resolve": {"scale": {"color": "independent"}}
    };

    vegaEmbed('#vis', spec, {"actions": false}).catch(console.error);
  </script>
</body>
</html>
