<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vega-Lite Assignment 3 - Interactive Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 25px; background-color: #f0f2f5; }
    h2 { color: #2d3748; text-align: center; margin-bottom: 20px; }
    #vis { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: max-content; margin: 0 auto; }
  </style>
</head>
<body>
  <h2>Multi-Dimensional Sales Dashboard</h2>
  <div id="vis"></div>

  <script>
    const spec = {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
      "data": {
        "url": "HW_III.csv",
        "format": {"type": "csv"}
      },
      "transform": [
        {"calculate": "toNumber(replace(datum['Unit Cost'], ',', ''))", "as": "UnitCostNum"},
        {"calculate": "toNumber(replace(datum['Total'], ',', ''))", "as": "TotalNum"}
      ],
      "vconcat": [
        {
          "hconcat": [
            {
              "title": "Total Sales by Region",
              "width": 300, "height": 200,
              "mark": {"type": "arc", "innerRadius": 50, "tooltip": true},
              "encoding": {
                "theta": {"field": "TotalNum", "type": "quantitative", "aggregate": "sum"},
                "color": {
                  "field": "Region", 
                  "type": "nominal",
                  "scale": {"scheme": "set1"} 
                },
                "tooltip": [
                  {"field": "Region", "type": "nominal"},
                  {"field": "TotalNum", "type": "quantitative", "aggregate": "sum", "title": "Total Sales", "format": "$,.2f"}
                ]
              }
            },
            {
              "title": "Item Cost vs. Total Sales",
              "width": 400, "height": 200,
              "mark": {"type": "point", "filled": true, "size": 100, "tooltip": true},
              "encoding": {
                "x": {"field": "UnitCostNum", "type": "quantitative", "title": "Unit Cost ($)"},
                "y": {"field": "TotalNum", "type": "quantitative", "title": "Total ($)"},
                "color": {
                  "field": "Item", 
                  "type": "nominal",
                  "scale": {"scheme": "set2"} 
                },
                "tooltip": [
                  {"field": "Item", "type": "nominal"},
                  {"field": "UnitCostNum", "type": "quantitative", "title": "Unit Cost", "format": "$,.2f"},
                  {"field": "TotalNum", "type": "quantitative", "title": "Total", "format": "$,.2f"}
                ]
              }
            }
          ]
        },
        {
          "hconcat": [
            {
              "title": "Units Sold by Representative (Stacked by Item)",
              "width": 350, "height": 250,
              "mark": {"type": "bar", "tooltip": true},
              "encoding": {
                "x": {"field": "Rep", "type": "nominal", "title": "Representative", "axis": {"labelAngle": -45}},
                "y": {"field": "Units", "type": "quantitative", "aggregate": "sum", "title": "Total Units Sold"},
                "color": {
                  "field": "Item", 
                  "type": "nominal",
                  "scale": {"scheme": "set2"} 
                },
                "tooltip": [
                  {"field": "Rep", "type": "nominal"},
                  {"field": "Item", "type": "nominal"},
                  {"field": "Units", "type": "quantitative", "aggregate": "sum", "title": "Units"}
                ]
              }
            }
          ]
        }
      ],
      "config": {
        "axis": {"labelFontSize": 12, "titleFontSize": 14},
        "legend": {"labelFontSize": 12, "titleFontSize": 14}
      }
    };

    vegaEmbed('#vis', spec).catch(console.error);
  </script>
</body>
</html>
